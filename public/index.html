<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BluGlo — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      :root {
        --bg: #07080b;
        --panel: rgba(15, 17, 23, 0.88);
        --panel-2: rgba(18, 21, 28, 0.92);
        --card: rgba(16, 19, 26, 0.94);
        --card-hover: rgba(20, 24, 32, 0.98);
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.14);
        --text: #f4f7fb;
        --text-soft: #ced5df;
        --muted: #8a95a6;
        --muted-2: #677184;
        --accent: #7dd3fc;
        --accent-soft: rgba(125, 211, 252, 0.12);
        --green: #4ade80;
        --orange: #fbbf24;
        --red: #fb7185;
        --blue: #60a5fa;
        --mono: "IBM Plex Mono", monospace;
        --sans: "Inter", sans-serif;
        --radius: 24px;
        --radius-sm: 18px;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        --header-h: 72px;
      }

      body {
        font-family: var(--sans);
        background:
          radial-gradient(circle at top left, rgba(96, 165, 250, 0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(125, 211, 252, 0.08), transparent 22%),
          linear-gradient(180deg, #05060a 0%, #090b10 100%);
        color: var(--text);
        overflow: hidden;
      }

      button, input { font: inherit; }

      #app {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        grid-template-rows: var(--header-h) 1fr;
        height: 100vh;
        height: 100dvh;
      }

      header {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(22px);
        background: rgba(8, 10, 14, 0.72);
      }

      .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
      .brand-mark {
        width: 42px; height: 42px; border-radius: 14px; display: grid; place-items: center;
        background: linear-gradient(180deg, rgba(125,211,252,0.16), rgba(125,211,252,0.06));
        border: 1px solid rgba(125,211,252,0.22); box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      }
      .logo-main { font-family: var(--mono); font-size: 15px; letter-spacing: 0.16em; color: var(--accent); }
      .logo-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

      .header-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      .header-pill {
        min-height: 40px; padding: 0 14px; border-radius: 999px; display: inline-flex; align-items: center; gap: 8px;
        border: 1px solid var(--border); background: rgba(14, 17, 24, 0.84); color: var(--text-soft);
        font-size: 12px; font-family: var(--mono); backdrop-filter: blur(12px);
      }
      .header-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
      .header-time { color: var(--muted); font-family: var(--mono); font-size: 12px; min-width: 68px; text-align: right; }

      .panel { min-width: 0; min-height: 0; }
      #bots-panel {
        border-right: 1px solid var(--border);
        background: rgba(8, 10, 14, 0.44);
        backdrop-filter: blur(24px);
        overflow: auto;
        padding: 18px;
      }
      #detail-panel {
        overflow: auto;
        padding: 22px;
      }

      .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
      .panel-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; }
      .subtle-badge {
        padding: 6px 10px; border-radius: 999px; background: rgba(14, 17, 24, 0.84); border: 1px solid var(--border);
        color: var(--muted); font-size: 11px; font-family: var(--mono);
      }

      .search-shell { margin-bottom: 14px; }
      .search-input {
        width: 100%; height: 44px; border-radius: 16px; border: 1px solid var(--border);
        background: rgba(14, 17, 24, 0.88); color: var(--text); padding: 0 14px; outline: none;
        transition: border-color .16s ease, background .16s ease;
      }
      .search-input::placeholder { color: var(--muted-2); }
      .search-input:focus { border-color: rgba(125, 211, 252, 0.3); background: rgba(16, 20, 28, 0.96); }

      #bots-list { display: flex; flex-direction: column; gap: 12px; }
      .empty-bots, .detail-empty {
        border: 1px dashed var(--border); border-radius: var(--radius); background: rgba(12, 14, 19, 0.8);
        color: var(--muted); box-shadow: var(--shadow);
      }
      .empty-bots { padding: 24px 18px; line-height: 1.8; font-size: 14px; }
      .empty-bots code {
        color: var(--accent); background: rgba(125, 211, 252, 0.08); border: 1px solid rgba(125, 211, 252, 0.12);
        padding: 2px 7px; border-radius: 9px; font-family: var(--mono);
      }

      .bot-card {
        padding: 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); cursor: pointer;
        transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
        box-shadow: 0 8px 30px rgba(0,0,0,.16); min-width: 0;
      }
      .bot-card:hover {
        transform: translateY(-1px); border-color: rgba(125, 211, 252, 0.16); background: var(--card-hover);
      }
      .bot-card.selected {
        border-color: rgba(125, 211, 252, 0.28); background: linear-gradient(180deg, rgba(18,23,31,.98), rgba(15,18,25,.98));
        box-shadow: 0 16px 50px rgba(0,0,0,.28), inset 0 0 0 1px rgba(125,211,252,.08);
      }
      .bot-card-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .bot-card-title { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .bot-card-title-text { font-size: 15px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
      .dot-active { background: var(--green); box-shadow: 0 0 0 6px rgba(74, 222, 128, 0.08); }
      .dot-busy { background: var(--orange); box-shadow: 0 0 0 6px rgba(251, 191, 36, 0.08); }
      .dot-offline { background: var(--red); box-shadow: 0 0 0 6px rgba(251, 113, 133, 0.08); }
      .dot-loading { background: var(--blue); box-shadow: 0 0 0 6px rgba(96, 165, 250, 0.08); }
      .presence-mini {
        color: var(--muted); font-size: 11px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em;
      }
      .bot-card-subid {
        margin-top: 9px; color: var(--muted-2); font-size: 11px; font-family: var(--mono);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .bot-card-status { margin-top: 9px; font-size: 13px; color: var(--text-soft); min-height: 18px; }
      .bot-card-stats { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
      .bot-stat {
        padding: 6px 10px; border-radius: 999px; border: 1px solid var(--border); background: rgba(10, 13, 18, 0.84);
        color: var(--muted); font-size: 11px; font-family: var(--mono);
      }
      .bot-stat strong { color: var(--accent); font-weight: 600; }

      .detail-empty {
        min-height: calc(100% - 12px); display: grid; place-items: center; text-align: center; padding: 28px;
      }
      .detail-empty-box { max-width: 420px; }
      .taxi-icon { font-size: 54px; opacity: .56; margin-bottom: 8px; }

      .detail-wrap { display: flex; flex-direction: column; gap: 18px; }
      .mobile-back {
        display: none; width: fit-content; height: 40px; padding: 0 14px; border-radius: 999px; border: 1px solid var(--border);
        background: rgba(14,17,24,.84); color: var(--text-soft); margin-bottom: 14px;
      }

      .hero {
        position: relative; overflow: hidden; border-radius: 30px; border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(16,19,26,.96), rgba(10,12,17,.92));
        padding: 26px; box-shadow: var(--shadow);
      }
      .hero::after {
        content: ""; position: absolute; inset: auto -40px -60px auto; width: 220px; height: 220px;
        background: radial-gradient(circle, rgba(125,211,252,.14), transparent 65%); pointer-events: none;
      }
      .detail-display-name { font-size: clamp(28px, 4vw, 40px); line-height: 1.02; font-weight: 800; word-break: break-word; }
      .detail-account-id {
        margin-top: 10px; color: var(--muted); font-family: var(--mono); font-size: 12px; overflow-wrap: anywhere;
      }
      .presence-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
      .presence-badge, .hero-chip {
        display: inline-flex; align-items: center; gap: 8px; min-height: 38px; padding: 0 12px; border-radius: 999px;
        font-size: 12px; font-family: var(--mono); border: 1px solid transparent;
      }
      .badge-active { background: rgba(74,222,128,.1); color: var(--green); border-color: rgba(74,222,128,.18); }
      .badge-busy { background: rgba(251,191,36,.1); color: var(--orange); border-color: rgba(251,191,36,.18); }
      .badge-offline { background: rgba(251,113,133,.1); color: var(--red); border-color: rgba(251,113,133,.18); }
      .badge-loading { background: rgba(96,165,250,.1); color: var(--blue); border-color: rgba(96,165,250,.18); }
      .hero-chip { background: rgba(255,255,255,.04); color: var(--text-soft); border-color: var(--border); }

      .section {
        border-radius: 28px; border: 1px solid var(--border); background: rgba(12,14,19,.82); padding: 20px;
        box-shadow: 0 18px 60px rgba(0,0,0,.22); backdrop-filter: blur(20px);
      }
      .section-title {
        display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
        font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .16em; color: var(--muted);
      }
      .section-title::after { content: ""; height: 1px; flex: 1; background: var(--border); }
      .stats-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
      .stat-box {
        border-radius: 22px; border: 1px solid var(--border); background: rgba(16,19,26,.88); padding: 18px; min-width: 0;
      }
      .stat-box-label { color: var(--muted); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; font-family: var(--mono); }
      .stat-box-value {
        margin-top: 12px; font-size: clamp(22px, 3vw, 32px); line-height: 1; font-weight: 800; color: var(--text);
        word-break: break-word;
      }
      .stat-box-value.accent { color: var(--accent); }
      .stat-box-hint { margin-top: 10px; color: var(--muted); font-size: 12px; line-height: 1.5; }
      .mini-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
      .mini-card {
        border-radius: 20px; border: 1px solid var(--border); background: rgba(16,19,26,.88); padding: 16px;
      }
      .mini-label { color: var(--muted); font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; }
      .mini-value { margin-top: 10px; color: var(--text-soft); font-size: 14px; line-height: 1.55; word-break: break-word; }
      .mini-value strong { color: var(--text); }
      .mini-value.good { color: var(--green); }
      .mini-value.bad { color: var(--red); }

      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }

      @media (max-width: 1060px) {
        #app { grid-template-columns: 320px minmax(0, 1fr); }
      }

      @media (max-width: 860px) {
        #app { grid-template-columns: 1fr; }
        #bots-panel { border-right: 0; }
        #detail-panel {
          position: fixed; inset: var(--header-h) 0 0 0; z-index: 30; background: rgba(7,8,11,.96);
          backdrop-filter: blur(24px); transform: translateX(100%); transition: transform .22s ease;
          padding: 18px 16px 28px;
        }
        #detail-panel.mobile-open { transform: translateX(0); }
        .mobile-back { display: inline-flex; align-items: center; justify-content: center; }
        .stats-grid, .mini-grid { grid-template-columns: 1fr; }
      }

      @media (max-width: 560px) {
        header { padding: 14px 14px; }
        .logo-sub, .header-time { display: none; }
        .header-group { gap: 8px; }
        .header-pill { min-height: 36px; padding: 0 12px; }
        #bots-panel, #detail-panel { padding: 14px; }
        .hero { padding: 22px 18px; border-radius: 24px; }
        .section { padding: 16px; border-radius: 22px; }
        .bot-card { padding: 14px; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="brand">
          <div class="brand-mark">🚕</div>
          <div>
            <div class="logo-main">BLUGLO</div>
            <div class="logo-sub">Bot dashboard</div>
          </div>
        </div>

        <div class="header-group">
          <div class="header-pill">
            <div class="dot" id="conn-dot"></div>
            <span id="conn-label">Connecting...</span>
          </div>
          <div class="header-pill"><span id="bots-count">0</span>&nbsp;bots</div>
          <div class="header-time" id="clock"></div>
        </div>
      </header>

      <aside id="bots-panel" class="panel">
        <div class="panel-head">
          <div class="panel-label">Bots</div>
          <div class="subtle-badge">Live state</div>
        </div>

        <div class="search-shell">
          <input id="bot-search" class="search-input" type="text" placeholder="Search bots..." />
        </div>

        <div id="bots-list">
          <div class="empty-bots">
            No bots yet.<br />
            Use <code>/add</code> in the console to add an account.
          </div>
        </div>
      </aside>

      <main id="detail-panel" class="panel">
        <button id="mobile-back" class="mobile-back" type="button">← All bots</button>
        <div class="detail-empty">
          <div class="detail-empty-box">
            <div class="taxi-icon">🚕</div>
            <div style="font-size: 20px; color: var(--text-soft); font-weight: 700">Select a bot</div>
            <div style="margin-top: 8px; line-height: 1.65">Choose one from the list to see its live info, power stats, taxi counters and uptime.</div>
          </div>
        </div>
      </main>
    </div>

    <script>
      const bots = new Map();
      let selected = null;
      let botFilter = "";

      const clockEl = document.getElementById("clock");
      const searchEl = document.getElementById("bot-search");
      const detailPanel = document.getElementById("detail-panel");
      const mobileBackButton = document.getElementById("mobile-back");

      setInterval(() => {
        clockEl.textContent = new Date().toLocaleTimeString("en-GB", { hour12: false });
      }, 1000);

      searchEl?.addEventListener("input", (e) => {
        botFilter = e.target.value.trim().toLowerCase();
        renderBotList();
      });

      mobileBackButton?.addEventListener("click", () => {
        detailPanel.classList.remove("mobile-open");
      });

      let es;

      function connect() {
        es = new EventSource("/events");

        es.addEventListener("snapshot", (e) => {
          const data = JSON.parse(e.data);
          bots.clear();
          data.forEach((b) => bots.set(b.accountId, b));
          renderBotList();
          if (selected && bots.has(selected)) {
            renderDetail(selected);
          } else if (selected && !bots.has(selected)) {
            selected = null;
            showEmpty();
          }
          setConnected(true);
        });

        es.addEventListener("status", (e) => {
          const { accountId, presence, status } = JSON.parse(e.data);
          const bot = bots.get(accountId) ?? { accountId, stats: {} };
          bot.presence = presence;
          bot.status = status;
          bots.set(accountId, bot);
          updateBotCard(accountId);
          if (selected === accountId) renderDetail(accountId);
        });

        es.addEventListener("profile", (e) => {
          const { accountId, displayName } = JSON.parse(e.data);
          const bot = bots.get(accountId) ?? { accountId, stats: {} };
          bot.displayName = displayName;
          bots.set(accountId, bot);
          updateBotCard(accountId);
          if (selected === accountId) renderDetail(accountId);
        });

        es.addEventListener("joined", (e) => {
          const { accountId, members } = JSON.parse(e.data);
          const bot = bots.get(accountId);
          if (bot) {
            bot.currentMembers = members;
            bots.set(accountId, bot);
            updateBotCard(accountId);
          }
          if (selected === accountId) renderDetail(accountId);
        });

        es.addEventListener("invite", (e) => {
          const { accountId, from, fromId } = JSON.parse(e.data);
          const bot = bots.get(accountId);
          if (bot) {
            bot.lastInvite = { from, fromId, at: Date.now() };
            bots.set(accountId, bot);
          }
          if (selected === accountId) renderDetail(accountId);
        });

        es.addEventListener("removed", (e) => {
          const { accountId } = JSON.parse(e.data);
          bots.delete(accountId);
          if (selected === accountId) {
            selected = null;
            detailPanel.classList.remove("mobile-open");
            showEmpty();
          }
          renderBotList();
        });

        es.onerror = () => {
          setConnected(false);
          es.close();
          setTimeout(connect, 3000);
        };
      }

      function setConnected(ok) {
        document.getElementById("conn-dot").style.background = ok ? "var(--green)" : "var(--red)";
        document.getElementById("conn-label").textContent = ok ? "Connected" : "Reconnecting...";
      }

      connect();

      setInterval(() => {
        document.getElementById("bots-count").textContent = bots.size;
        if (selected && bots.has(selected)) renderDetail(selected);
        renderBotList(true);
      }, 1000);

      function getFilteredBots() {
        const entries = [...bots.entries()];

        const filtered = botFilter
          ? entries.filter(([id, bot]) => {
              const displayName = (bot.displayName || "").toLowerCase();
              const accountId = id.toLowerCase();
              const status = (bot.status || "").toLowerCase();
              return displayName.includes(botFilter) || accountId.includes(botFilter) || status.includes(botFilter);
            })
          : entries;

        return filtered.sort((a, b) => {
          const aScore = presenceRank(a[1]?.presence);
          const bScore = presenceRank(b[1]?.presence);
          if (aScore !== bScore) return aScore - bScore;

          const aName = (a[1]?.displayName || a[0]).toLowerCase();
          const bName = (b[1]?.displayName || b[0]).toLowerCase();
          return aName.localeCompare(bName);
        });
      }

      function presenceRank(p) {
        return { active: 0, busy: 1, loading: 2, offline: 3 }[p] ?? 99;
      }

      function renderBotList(keepDom = false) {
        document.getElementById("bots-count").textContent = bots.size;
        const container = document.getElementById("bots-list");
        const filteredBots = getFilteredBots();

        if (filteredBots.length === 0) {
          container.innerHTML = `
            <div class="empty-bots">
              ${bots.size === 0
                ? 'No bots yet.<br />Use <code>/add</code> in the console to add an account.'
                : 'No bots match your search.'}
            </div>
          `;
          return;
        }

        if (keepDom && container.children.length === filteredBots.length) {
          for (const [id] of filteredBots) updateBotCard(id);
          return;
        }

        container.innerHTML = "";
        for (const [id, bot] of filteredBots) {
          container.appendChild(makeBotCard(id, bot));
        }
      }

      function makeBotCard(accountId, bot) {
        const el = document.createElement("div");
        el.className = `bot-card${selected === accountId ? " selected" : ""}`;
        el.id = `card-${accountId}`;
        el.onclick = () => selectBot(accountId);

        const displayName = bot.displayName || `${accountId.slice(0, 8)}...`;
        const totalUptime = getLiveTotalUptime(bot);
        const partyCount = Array.isArray(bot.currentMembers) ? bot.currentMembers.length : 0;

        el.innerHTML = `
          <div class="bot-card-top">
            <div class="bot-card-title">
              <div class="status-dot ${presenceToDotClass(bot.presence)}"></div>
              <div class="bot-card-title-text">${esc(displayName)}</div>
            </div>
            <div class="presence-mini">${esc(readablePresence(bot.presence))}</div>
          </div>

          <div class="bot-card-subid">${esc(accountId)}</div>
          <div class="bot-card-status">${esc(bot.status || "—")}</div>

          <div class="bot-card-stats">
            <div class="bot-stat">Taxis <strong>${bot.stats?.taxisCompleted ?? 0}</strong></div>
            <div class="bot-stat">Uptime <strong>${esc(formatDuration(totalUptime))}</strong></div>
            <div class="bot-stat">Party <strong>${partyCount}</strong></div>
          </div>
        `;
        return el;
      }

      function updateBotCard(accountId) {
        const bot = bots.get(accountId);
        if (!bot) return;
        const existing = document.getElementById(`card-${accountId}`);
        if (existing) {
          existing.replaceWith(makeBotCard(accountId, bot));
        }
      }

      function selectBot(accountId) {
        selected = accountId;
        document.querySelectorAll(".bot-card").forEach((c) => c.classList.remove("selected"));
        document.getElementById(`card-${accountId}`)?.classList.add("selected");
        renderDetail(accountId);
        if (window.innerWidth <= 860) {
          detailPanel.classList.add("mobile-open");
          detailPanel.scrollTop = 0;
        }
      }

      function renderDetail(accountId) {
        const bot = bots.get(accountId);
        if (!bot) return;

        const displayName = bot.displayName || "Unknown account";
        const totalUptime = getLiveTotalUptime(bot);
        const currentSessionUptime = getCurrentSessionUptime(bot);
        const powerValue = bot.actions?.high ? "92765" : "0";
        const partyMembers = Array.isArray(bot.currentMembers) ? bot.currentMembers : [];
        const lastInvite = bot.lastInvite?.from ? bot.lastInvite.from : "—";

        detailPanel.innerHTML = `
          <button id="mobile-back" class="mobile-back" type="button">← All bots</button>

          <div class="detail-wrap">
            <section class="hero">
              <div class="detail-display-name">${esc(displayName)}</div>
              <div class="detail-account-id">${esc(accountId)}</div>

              <div class="presence-row">
                <div class="presence-badge ${presenceToBadgeClass(bot.presence)}">
                  ${esc(readablePresence(bot.presence))} — ${esc(bot.status || "No status")}
                </div>
                <div class="hero-chip">Retries: ${bot.retryCount ?? 0}</div>
                <div class="hero-chip">Party members: ${partyMembers.length}</div>
              </div>
            </section>

            <section class="section">
              <div class="section-title">Overview</div>
              <div class="stats-grid">
                <div class="stat-box">
                  <div class="stat-box-label">Power</div>
                  <div class="stat-box-value accent">${powerValue}</div>
                  <div class="stat-box-hint">${bot.actions?.high ? "HighStats enabled" : "HighStats disabled"}</div>
                </div>

                <div class="stat-box">
                  <div class="stat-box-label">Taxis completed</div>
                  <div class="stat-box-value">${bot.stats?.taxisCompleted ?? 0}</div>
                  <div class="stat-box-hint">Successful taxi runs detected from matchmaking.</div>
                </div>

                <div class="stat-box">
                  <div class="stat-box-label">Total uptime</div>
                  <div class="stat-box-value">${esc(formatDuration(totalUptime))}</div>
                  <div class="stat-box-hint">Accumulated uptime + current session uptime.</div>
                </div>

                <div class="stat-box">
                  <div class="stat-box-label">Current session</div>
                  <div class="stat-box-value">${esc(formatDuration(currentSessionUptime))}</div>
                  <div class="stat-box-hint">Time connected since the latest successful login.</div>
                </div>
              </div>
            </section>

            <section class="section">
              <div class="section-title">Live details</div>
              <div class="mini-grid">
                <div class="mini-card">
                  <div class="mini-label">Invites declined</div>
                  <div class="mini-value"><strong>${bot.stats?.invitesDeclined ?? 0}</strong></div>
                </div>

                <div class="mini-card">
                  <div class="mini-label">HighStats</div>
                  <div class="mini-value ${bot.actions?.high ? "good" : "bad"}"><strong>${bot.actions?.high ? "Enabled" : "Disabled"}</strong></div>
                </div>

                <div class="mini-card">
                  <div class="mini-label">Current party</div>
                  <div class="mini-value">${partyMembers.length ? esc(partyMembers.map((m) => m.displayName || m.accountId?.slice(0, 8) || "Unknown").join(", ")) : "No external party members right now."}</div>
                </div>

                <div class="mini-card">
                  <div class="mini-label">Last invite</div>
                  <div class="mini-value">${esc(lastInvite)}</div>
                </div>
              </div>
            </section>
          </div>
        `;

        document.getElementById("mobile-back")?.addEventListener("click", () => {
          detailPanel.classList.remove("mobile-open");
        });
      }

      function showEmpty() {
        detailPanel.innerHTML = `
          <button id="mobile-back" class="mobile-back" type="button">← All bots</button>
          <div class="detail-empty">
            <div class="detail-empty-box">
              <div class="taxi-icon">🚕</div>
              <div style="font-size: 20px; color: var(--text-soft); font-weight: 700">Select a bot</div>
              <div style="margin-top: 8px; line-height: 1.65">Choose one from the list to see its live info, power stats, taxi counters and uptime.</div>
            </div>
          </div>
        `;
        document.getElementById("mobile-back")?.addEventListener("click", () => {
          detailPanel.classList.remove("mobile-open");
        });
      }

      function getCurrentSessionUptime(bot) {
        const connectedAt = bot?.stats?.connectedAt;
        if (!connectedAt) return 0;
        return Math.max(0, Math.floor((Date.now() - connectedAt) / 1000));
      }

      function getLiveTotalUptime(bot) {
        return (bot?.stats?.totalUptime ?? 0) + getCurrentSessionUptime(bot);
      }

      function readablePresence(value) {
        return { active: "Active", busy: "Busy", loading: "Loading", offline: "Offline" }[value] ?? "Offline";
      }

      function presenceToDotClass(value) {
        return { active: "dot-active", busy: "dot-busy", loading: "dot-loading", offline: "dot-offline" }[value] ?? "dot-offline";
      }

      function presenceToBadgeClass(value) {
        return { active: "badge-active", busy: "badge-busy", loading: "badge-loading", offline: "badge-offline" }[value] ?? "badge-offline";
      }

      function formatDuration(seconds) {
        const s = Math.max(0, Math.floor(seconds || 0));
        const days = Math.floor(s / 86400);
        const hours = Math.floor((s % 86400) / 3600);
        const minutes = Math.floor((s % 3600) / 60);
        const secs = s % 60;

        if (days > 0) return `${days}d ${hours}h ${minutes}m`;
        if (hours > 0) return `${hours}h ${minutes}m`;
        if (minutes > 0) return `${minutes}m ${secs}s`;
        return `${secs}s`;
      }

      function esc(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
